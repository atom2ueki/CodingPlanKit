<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">CodingPlanKit</title>
  <desc id="desc">OAuth + plan-bound API clients for ChatGPT in Swift. iOS 17+ / macOS 14+, Swift 6 strict concurrency.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0b0f17"/>
      <stop offset="55%" stop-color="#101521"/>
      <stop offset="100%" stop-color="#1a1426"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#10a37f"/>
      <stop offset="55%"  stop-color="#5cd1ad"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.18" cy="0.5" r="0.55">
      <stop offset="0%"   stop-color="#10a37f" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#10a37f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#10a37f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0.85" cy="0.6" r="0.5">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#a78bfa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <rect width="1280" height="320" fill="url(#glow2)"/>

  <!-- top accent strip -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- mark: shield + key -->
  <g transform="translate(96 86)">
    <path d="M0 24 C 0 10, 12 0, 24 0 H 96 C 108 0, 120 10, 120 24 V 92
             C 120 124, 96 144, 60 152 C 24 144, 0 124, 0 92 Z"
          fill="none" stroke="url(#mark)" stroke-width="3"/>
    <!-- inner key glyph -->
    <g transform="translate(60 76)" stroke="url(#mark)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-18" cy="0" r="14"/>
      <path d="M -4 0 H 30 M 22 0 V 10 M 30 0 V 8"/>
    </g>
  </g>

  <!-- title -->
  <text x="270" y="158"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Inter, system-ui, sans-serif"
        font-size="84" font-weight="700" fill="#f5f7fa" letter-spacing="-1">
    CodingPlanKit
  </text>

  <!-- tagline -->
  <text x="272" y="208"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Inter, system-ui, sans-serif"
        font-size="26" font-weight="500" fill="#9ca3af" letter-spacing="0.2">
    OAuth + plan-bound Codex API clients for ChatGPT, in Swift.
  </text>

  <!-- chips row -->
  <g transform="translate(272 244)" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace" font-size="14" font-weight="600">
    <g>
      <rect x="0" y="0" width="118" height="30" rx="15" fill="#0f172a" stroke="#10a37f" stroke-width="1"/>
      <text x="59" y="20" text-anchor="middle" fill="#5cd1ad">iOS 17+</text>
    </g>
    <g transform="translate(130 0)">
      <rect x="0" y="0" width="138" height="30" rx="15" fill="#0f172a" stroke="#10a37f" stroke-width="1"/>
      <text x="69" y="20" text-anchor="middle" fill="#5cd1ad">macOS 14+</text>
    </g>
    <g transform="translate(280 0)">
      <rect x="0" y="0" width="106" height="30" rx="15" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
      <text x="53" y="20" text-anchor="middle" fill="#c4b5fd">Swift 6</text>
    </g>
    <g transform="translate(398 0)">
      <rect x="0" y="0" width="158" height="30" rx="15" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
      <text x="79" y="20" text-anchor="middle" fill="#c4b5fd">OAuth 2.0 + PKCE</text>
    </g>
    <g transform="translate(568 0)">
      <rect x="0" y="0" width="120" height="30" rx="15" fill="#0f172a" stroke="#9ca3af" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" fill="#d1d5db">Keychain</text>
    </g>
  </g>

  <!-- bottom accent strip -->
  <rect x="0" y="317" width="1280" height="3" fill="url(#accent)"/>
</svg>
